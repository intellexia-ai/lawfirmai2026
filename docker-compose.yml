version: "3.9"

services:
  agent:
    build:
      context: ../Desktop/crza-agent
    ports:
      - "8000:8000"
    env_file:
      - ../Desktop/crza-agent/.env
    restart: unless-stopped

  site:
    build:
      context: .
      args:
        VITE_AGENT_URL: http://localhost:8000
    ports:
      - "3000:80"
    depends_on:
      - agent
    restart: unless-stopped
